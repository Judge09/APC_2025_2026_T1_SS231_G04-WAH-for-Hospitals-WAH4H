services:
  # Django + Gunicorn backend
  backend:
    build:
      context: ../wah4h-backend
      dockerfile: Dockerfile
    env_file: ../wah4h-backend/.env
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000/api/accounts/login/initiate/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # React frontend (nginx) — serves UI and proxies /api/ to backend
  frontend:
    build:
      context: ../Frontend/wah4hospitals-clinic-hub-79-main
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
